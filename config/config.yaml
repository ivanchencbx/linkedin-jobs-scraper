# LinkedIn 配置
linkedin:
  email: "ivanchen99@gmail.com"
  password: "Ivan3573"
  username_display: "Ivan Chen"  # 用于验证登录成功的显示名称

# 搜索配置
search:
  # 职位搜索URL模板
  base_url: "https://www.linkedin.com/jobs/search/"
  filters:
    f_F: "it"                    # 功能领域
    f_CR: "102890883"            # 国家/地区
    f_E: "3,4,5,6"               # 经验级别
    f_JT: "F"                    # 职位类型 (F=全职)
    f_TPR: "2592000"             # 时间范围 (30天)
    f_WT: "1"                    # 工作类型 (1=现场)
  keywords: '("System"OR"Systems"OR"Software"OR"Engineer"OR"Digital"OR"Partner"OR"Product Manager"OR"Owner"OR"HEAD"OR"Lead"OR"Leader"OR"Director"OR"Manager"OR"Application"OR"CIO"OR"AI"OR"Artificial Intelligence"OR"Solution")AND("Health"OR"Healthcare"OR"Medical"OR"Medical care"OR"Life Science"OR"MedTech"OR"Devices"OR"Business"OR"HCP"OR"Customer"OR"Consumer"OR"Veeva"OR"Salesforce"OR"SFDC"OR"R%26D"OR"Tech")'
  sort_by: "R"                   # R=最近, D=发布日期
  results_per_page: 25

# 浏览器配置
browser:
  headless: true
  window_width: 1920
  window_height: 1080
  page_load_timeout: 300        # 页面加载超时(秒)
  implicit_wait: 10             # 隐式等待时间(秒)

# 等待时间配置
waits:
  page_load: 300                # 页面加载后等待时间(秒)
  element_wait: 60              # 元素等待超时(秒)
  verification_retry: 30        # 验证码重试间隔(秒)
  between_pages: 5              # 页面间等待时间(秒)

# CSV存储配置
storage:
  filename: "linkedin_jobs.csv"
  encoding: "utf-8-sig"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "scraper.log"